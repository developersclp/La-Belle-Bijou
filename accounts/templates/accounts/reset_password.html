{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Senha - La Belle Bijou</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #252A36;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #2F3441;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    h1 {
      color: #D4AC6E;
      margin-bottom: 10px;
    }
    p {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 20px;
    }
    input[type=email] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      margin-bottom: 15px;
      outline: none;
    }
    button {
      background-color: #D4AC6E;
      color: #202A3A;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #c89f5e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Redefinir Senha</h1>
    <p>Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.email }}
      <button type="submit">Enviar link</button>
    </form>
  </div>
</body>
</html>
