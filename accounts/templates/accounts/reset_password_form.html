<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nova Senha - La Belle Bijou</title>
  <style>
    body {
      background-color: #252A36;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #2F3441;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
    }
    h1 { color: #D4AC6E; margin-bottom: 10px; }
    p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    button {
      background-color: #D4AC6E;
      color: #202A3A;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background-color: #c89f5e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nova Senha</h1>
    <p>Defina sua nova senha abaixo.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Atualizar Senha</button>
    </form>
  </div>
</body>
</html>
